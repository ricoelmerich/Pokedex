<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/x-icon"
      href="assets/icons/alanyadk-pokemon-1536849_640.png"
    />
    <script src="scripts/templates.js"></script>
    <script src="scripts/script.js"></script>
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="stylesheet" href="styles/fonts.css" />
    <link rel="stylesheet" href="styles/resp.css" />

    <title>Pokedex</title>
  </head>
  <body onload="loadPokemonlist()" onclick="removeOverlay(event)">
    <header>
      <img src="assets/imgs/Pokédex_logo.png" class="pokedex-img" />
      <section>
        <div>find Pokemon:</div>
        <input type="search" id="search" oninput="filterPokemon()" name="q" />

        <button>search</button>
      </section>
    </header>

    <main id="main" class="main">
      <img
        id="loading-spinner"
        src="assets/gif/simple_pokeball.gif"
        class="spinner"
        alt="Loading..."
      />
      <div id="overlay" class="overlay display-none"></div>
      <div id="content" class="content"></div>
    </main>

    <footer>
      <button id="load-more-btn" onclick="loadMorePokemon()">
        Load more Pokémon
      </button>
    </footer>
  </body>
</html>
